<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SQL QUEST</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=IBM+Plex+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0c0e16;
    --panel:#141826;
    --panel-2:#1b2032;
    --line:#2a3147;
    --amber:#ffcf5c;
    --amber-dim:#b8923a;
    --cyan:#5ad6e0;
    --pink:#ff5d8f;
    --green:#5ce08f;
    --text:#dfe4f0;
    --muted:#8b93a7;
    --mono:'IBM Plex Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --pixel:'Press Start 2P',var(--mono);
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0}
  body{
    background:
      radial-gradient(1200px 600px at 50% -10%, rgba(90,214,224,.06), transparent 60%),
      radial-gradient(900px 500px at 90% 110%, rgba(255,93,143,.05), transparent 60%),
      var(--bg);
    color:var(--text);
    font-family:var(--mono);
    min-height:100vh;
    display:flex;align-items:flex-start;justify-content:center;
    padding:32px 18px 80px;
  }
  .crt{position:fixed;inset:0;pointer-events:none;z-index:9;
    background:repeating-linear-gradient(to bottom, rgba(0,0,0,0) 0 2px, rgba(0,0,0,.16) 2px 3px);
    mix-blend-mode:multiply;opacity:.5;animation:flick 6s infinite steps(60)}
  @keyframes flick{0%,97%{opacity:.5}98%{opacity:.42}100%{opacity:.5}}
  @media (prefers-reduced-motion:reduce){.crt{animation:none}}

  .app{width:100%;max-width:760px;position:relative;z-index:1}

  .wordmark{font-family:var(--pixel);font-size:26px;line-height:1.4;color:var(--amber);
    text-shadow:0 0 14px rgba(255,207,92,.45);letter-spacing:1px}
  .wordmark .q{color:var(--cyan);text-shadow:0 0 14px rgba(90,214,224,.45)}
  .tag{color:var(--muted);font-size:12.5px;letter-spacing:3px;text-transform:uppercase;margin-top:14px}
  .panel{background:linear-gradient(180deg,var(--panel),var(--panel-2));
    border:1px solid var(--line);border-radius:14px;
    box-shadow:0 1px 0 rgba(255,255,255,.03) inset, 0 18px 40px rgba(0,0,0,.4)}
  .btn{font-family:var(--mono);font-weight:600;font-size:14px;cursor:pointer;
    border:1px solid var(--amber-dim);background:transparent;color:var(--amber);
    padding:13px 22px;border-radius:10px;letter-spacing:1px;text-transform:uppercase;
    transition:transform .06s ease, background .15s, box-shadow .15s}
  .btn:hover{background:rgba(255,207,92,.1);box-shadow:0 0 18px rgba(255,207,92,.18)}
  .btn:active{transform:translateY(1px)}
  .btn:focus-visible{outline:2px solid var(--cyan);outline-offset:2px}
  .btn.primary{background:var(--amber);color:#1a1305;border-color:var(--amber)}
  .btn.primary:hover{box-shadow:0 0 24px rgba(255,207,92,.4)}
  .btn.ghost{border-color:var(--line);color:var(--muted)}
  .btn.ghost:hover{background:rgba(255,255,255,.03);color:var(--text)}
  .btn:disabled{opacity:.4;cursor:not-allowed;box-shadow:none;background:transparent}
  .btn.primary:disabled{background:var(--amber);opacity:.35}

  .home{text-align:center;padding:46px 30px 40px}
  .home .tag{margin-bottom:30px}
  .blurb{color:var(--muted);font-size:14px;line-height:1.7;max-width:520px;margin:0 auto 30px}
  .blurb b{color:var(--text);font-weight:600}
  .stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin:0 auto 32px;max-width:560px}
  .stat{background:rgba(0,0,0,.25);border:1px solid var(--line);border-radius:10px;padding:14px 8px}
  .stat .v{font-family:var(--pixel);font-size:16px;color:var(--cyan);text-shadow:0 0 10px rgba(90,214,224,.35)}
  .stat .l{font-size:10px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-top:9px}
  .rules{text-align:left;max-width:560px;margin:0 auto 30px;font-size:12.5px;color:var(--muted);line-height:1.9}
  .rules .k{color:var(--amber)}
  .rules .pink{color:var(--pink)}

  .hud{display:flex;align-items:center;justify-content:space-between;gap:14px;
    padding:14px 18px;margin-bottom:14px}
  .hud .left{display:flex;align-items:center;gap:16px;min-width:0}
  .hearts{display:flex;gap:5px}
  .hearts svg{width:26px;height:24px;filter:drop-shadow(0 0 6px rgba(255,93,143,.35))}
  .score-wrap{display:flex;flex-direction:column;gap:3px}
  .score-wrap .l{font-size:9.5px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
  .score-wrap .v{font-family:var(--pixel);font-size:15px;color:var(--amber);text-shadow:0 0 10px rgba(255,207,92,.3)}
  .code{font-size:11px;color:var(--muted);letter-spacing:1px}
  .code b{color:var(--cyan)}
  .level-pill{font-size:10px;letter-spacing:2px;text-transform:uppercase;padding:6px 11px;border-radius:999px;
    border:1px solid var(--line)}
  .level-pill.easy{color:var(--green);border-color:rgba(92,224,143,.4)}
  .level-pill.medium{color:var(--pink);border-color:rgba(255,93,143,.4)}

  .timer{height:8px;background:rgba(0,0,0,.35);border-radius:999px;overflow:hidden;margin-bottom:18px;border:1px solid var(--line)}
  .timer .fill{height:100%;width:100%;background:linear-gradient(90deg,var(--cyan),var(--amber));
    transition:width .25s linear}
  .timer.warn .fill{background:linear-gradient(90deg,var(--pink),#ff8e3c)}

  .q-panel{padding:22px}
  .q-top{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
  .q-num{font-size:11px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
  .q-timeleft{font-family:var(--pixel);font-size:13px;color:var(--amber)}
  .q-timeleft.warn{color:var(--pink)}
  .q-prompt{font-size:16.5px;line-height:1.6;color:var(--text);margin:6px 0 4px}
  .q-prompt code{background:rgba(90,214,224,.12);color:var(--cyan);padding:1px 6px;border-radius:5px;font-size:14px}
  .schema-toggle{margin:14px 0 0;font-size:12px;color:var(--cyan);cursor:pointer;
    background:none;border:none;font-family:var(--mono);padding:0;letter-spacing:.5px}
  .schema-toggle:hover{text-decoration:underline}
  .schema{display:none;margin-top:14px}
  .schema.open{display:block}
  .schema-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
  .schema-card{background:rgba(0,0,0,.28);border:1px solid var(--line);border-radius:10px;overflow:hidden}
  .schema-card-h{background:rgba(255,207,92,.1);color:var(--amber);font-weight:700;font-size:12.5px;
    padding:8px 12px;letter-spacing:.5px;border-bottom:1px solid var(--line)}
  .schema-tbl{width:100%;border-collapse:collapse;font-size:12.5px}
  .schema-tbl td{padding:6px 12px;border-bottom:1px solid rgba(42,49,71,.5)}
  .schema-tbl tr:last-child td{border-bottom:none}
  .schema-tbl .col{color:var(--text)}
  .schema-tbl .ty{color:var(--muted);text-align:right;font-size:11px;letter-spacing:1px}
  @media (max-width:560px){.schema-grid{grid-template-columns:1fr}}

  .console-label{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin:20px 0 8px}
  .editor{position:relative}
  .editor::before{content:'SQL>';position:absolute;left:14px;top:13px;color:var(--green);
    font-size:14px;font-weight:600;pointer-events:none;opacity:.8}
  textarea{width:100%;min-height:120px;resize:vertical;background:#0a0c14;color:var(--text);
    border:1px solid var(--line);border-radius:10px;padding:13px 14px 13px 58px;
    font-family:var(--mono);font-size:15px;line-height:1.6;caret-color:var(--amber)}
  textarea:focus{outline:none;border-color:var(--cyan);box-shadow:0 0 0 3px rgba(90,214,224,.12)}
  textarea:disabled{opacity:.55}

  .row{display:flex;gap:12px;align-items:center;margin-top:14px;flex-wrap:wrap}
  .hintkey{font-size:11.5px;color:var(--muted);margin-left:auto}
  .hintkey kbd{background:var(--panel-2);border:1px solid var(--line);border-bottom-width:2px;
    border-radius:5px;padding:2px 7px;font-family:var(--mono);font-size:11px;color:var(--text)}

  .feedback{margin-top:16px;border-radius:10px;padding:14px 16px;font-size:13.5px;line-height:1.6;
    display:none;border:1px solid var(--line)}
  .feedback.show{display:block;animation:pop .18s ease}
  @keyframes pop{from{transform:scale(.98);opacity:.4}to{transform:scale(1);opacity:1}}
  @media (prefers-reduced-motion:reduce){.feedback.show{animation:none}}
  .feedback.correct{border-color:rgba(92,224,143,.5);background:rgba(92,224,143,.08);color:var(--green)}
  .feedback.minor{border-color:rgba(255,207,92,.5);background:rgba(255,207,92,.07);color:var(--amber)}
  .feedback.major{border-color:rgba(255,93,143,.5);background:rgba(255,93,143,.08);color:var(--pink)}
  .feedback .head{font-weight:700;letter-spacing:.5px;display:block;margin-bottom:5px}
  .feedback .reveal{margin-top:10px;background:#0a0c14;border:1px solid var(--line);border-radius:8px;
    padding:10px 12px;color:var(--text);font-size:13px;white-space:pre-wrap}
  .feedback .reveal .lbl{color:var(--muted);font-size:10px;letter-spacing:2px;text-transform:uppercase;display:block;margin-bottom:6px}
  #continuebar{margin-top:16px}
  #continuebar:empty{margin-top:0}

  .result{text-align:center;padding:46px 30px 40px}
  .result .big{font-family:var(--pixel);font-size:22px;margin-bottom:8px}
  .result .big.win{color:var(--green);text-shadow:0 0 16px rgba(92,224,143,.4)}
  .result .big.lose{color:var(--pink);text-shadow:0 0 16px rgba(255,93,143,.4)}
  .result .sub{color:var(--muted);font-size:13.5px;line-height:1.7;margin-bottom:28px}
  .finalscore{font-family:var(--pixel);font-size:34px;color:var(--amber);text-shadow:0 0 20px rgba(255,207,92,.4);margin:6px 0}
  .finalscore .new{display:block;font-size:11px;color:var(--green);margin-top:12px;letter-spacing:2px}
  .runcode-box{display:inline-block;margin:22px auto 6px;background:rgba(0,0,0,.3);
    border:1px dashed var(--cyan);border-radius:10px;padding:12px 22px}
  .runcode-box .l{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;display:block;margin-bottom:6px}
  .runcode-box .v{font-family:var(--pixel);font-size:16px;color:var(--cyan)}
  .result .row{justify-content:center;margin-top:30px}

  .foot{text-align:center;color:var(--muted);font-size:11px;margin-top:26px;letter-spacing:.5px}
  .foot b{color:var(--amber-dim)}
</style>
</head>
<body>
<div class="crt"></div>
<div class="app" id="app"></div>

<script>
/* ============================== STORAGE ============================== */
const memFallback = {};
async function storeGet(key){
  try{ const r = await window.storage.get(key,false); return r ? r.value : null; }
  catch(e){ return (key in memFallback) ? memFallback[key] : null; }
}
async function storeSet(key,val){
  try{ await window.storage.set(key,val,false); }
  catch(e){ memFallback[key]=val; }
}
let STATS = { highScore:0, bestStreak:0, runsStarted:0, runsCleared:0 };
async function loadStats(){
  const raw = await storeGet('sqlquest:stats');
  if(raw){ try{ STATS = Object.assign(STATS, JSON.parse(raw)); }catch(e){} }
}
async function saveStats(){ await storeSet('sqlquest:stats', JSON.stringify(STATS)); }

/* ============================== SCHEMA (table view) ============================== */
const SCHEMA_TABLES = [
  {name:'employees',   cols:[['emp_id','INT'],['name','VARCHAR'],['department','VARCHAR'],['salary','DECIMAL'],['hire_date','DATE']]},
  {name:'departments', cols:[['dept_name','VARCHAR'],['location','VARCHAR'],['budget','DECIMAL']]},
  {name:'customers',   cols:[['cust_id','INT'],['name','VARCHAR'],['city','VARCHAR'],['signup_date','DATE']]},
  {name:'orders',      cols:[['order_id','INT'],['cust_id','INT'],['amount','DECIMAL'],['order_date','DATE']]},
];
function schemaMarkup(){
  return '<div class="schema-grid">' + SCHEMA_TABLES.map(function(t){
    return '<div class="schema-card"><div class="schema-card-h">'+t.name+'</div><table class="schema-tbl">' +
      t.cols.map(function(c){ return '<tr><td class="col">'+c[0]+'</td><td class="ty">'+c[1]+'</td></tr>'; }).join('') +
      '</table></div>';
  }).join('') + '</div>';
}

/* ============================== QUESTIONS ============================== */
/* Progression mirrors SQLBolt/HackerRank: SELECT -> WHERE -> ORDER BY ->
   aggregates/GROUP BY -> HAVING -> JOIN -> subquery. Validation = pattern matching.
   Components are 'major' (whole clause/table -> full heart if missing) or
   'minor' (a detail -> half heart if missing). Case + semicolon checked separately as half hearts. */
const QUESTIONS = [
  { level:'EASY', mult:1, time:90,
    prompt:'Return <b>every column</b> for all rows in the <code>employees</code> table.',
    answer:'SELECT * FROM employees;',
    components:[
      {t:'major',re:/\bselect\b/,name:'SELECT'},
      {t:'major',re:/\bfrom\s+employees\b/,name:'FROM employees'},
      {t:'minor',re:/\*/,name:'* (all columns)'},
    ]},
  { level:'EASY', mult:1, time:90,
    prompt:'Return only the <code>name</code> and <code>salary</code> of every employee.',
    answer:'SELECT name, salary FROM employees;',
    components:[
      {t:'major',re:/\bselect\b/,name:'SELECT'},
      {t:'major',re:/\bfrom\s+employees\b/,name:'FROM employees'},
      {t:'minor',re:/\bname\b/,name:'name column'},
      {t:'minor',re:/\bsalary\b/,name:'salary column'},
    ]},
  { level:'EASY', mult:1, time:90,
    prompt:'Return the <code>name</code> of every employee in the <code>Sales</code> department.',
    answer:"SELECT name FROM employees WHERE department = 'Sales';",
    components:[
      {t:'major',re:/\bselect\b/,name:'SELECT'},
      {t:'major',re:/\bfrom\s+employees\b/,name:'FROM employees'},
      {t:'major',re:/\bwhere\b/,name:'WHERE'},
      {t:'minor',re:/\bname\b/,name:'name column'},
      {t:'minor',re:/\bdepartment\b/,name:'department column'},
      {t:'minor',re:/["']sales["']/i,name:"'Sales' value"},
    ]},
  { level:'EASY', mult:1, time:90,
    prompt:'Return all employees sorted by <code>salary</code>, <b>highest first</b>.',
    answer:'SELECT * FROM employees ORDER BY salary DESC;',
    components:[
      {t:'major',re:/\bselect\b/,name:'SELECT'},
      {t:'major',re:/\bfrom\s+employees\b/,name:'FROM employees'},
      {t:'major',re:/\border\s+by\b/,name:'ORDER BY'},
      {t:'minor',re:/\bsalary\b/,name:'salary column'},
      {t:'minor',re:/\bdesc\b/,name:'DESC (highest first)'},
    ]},
  { level:'MEDIUM', mult:1.5, time:90,
    prompt:'Return each <code>department</code> alongside the <b>number of employees</b> in it.',
    answer:'SELECT department, COUNT(*) FROM employees GROUP BY department;',
    components:[
      {t:'major',re:/\bselect\b/,name:'SELECT'},
      {t:'major',re:/\bfrom\s+employees\b/,name:'FROM employees'},
      {t:'major',re:/\bgroup\s+by\b/,name:'GROUP BY'},
      {t:'minor',re:/\bcount\b/,name:'COUNT(...)'},
      {t:'minor',re:/\bdepartment\b/,name:'department column'},
    ]},
  { level:'MEDIUM', mult:1.5, time:90,
    prompt:'Return each <code>department</code> and its <b>average salary</b>, but only for departments whose average salary is greater than <code>50000</code>.',
    answer:'SELECT department, AVG(salary) FROM employees\nGROUP BY department\nHAVING AVG(salary) > 50000;',
    components:[
      {t:'major',re:/\bselect\b/,name:'SELECT'},
      {t:'major',re:/\bfrom\s+employees\b/,name:'FROM employees'},
      {t:'major',re:/\bgroup\s+by\b/,name:'GROUP BY'},
      {t:'major',re:/\bhaving\b/,name:'HAVING'},
      {t:'minor',re:/\bavg\b/,name:'AVG(...)'},
      {t:'minor',re:/\bsalary\b/,name:'salary column'},
      {t:'minor',re:/50000/,name:'50000 threshold'},
    ]},
  { level:'MEDIUM', mult:1.5, time:90,
    prompt:"For every order, return its <code>amount</code> together with the <b>customer's name</b>. Join <code>orders</code> to <code>customers</code> on <code>cust_id</code>.",
    answer:'SELECT orders.amount, customers.name\nFROM orders\nJOIN customers ON orders.cust_id = customers.cust_id;',
    components:[
      {t:'major',re:/\bselect\b/,name:'SELECT'},
      {t:'major',re:/\bjoin\b/,name:'JOIN'},
      {t:'major',re:/\bon\b/,name:'ON'},
      {t:'major',re:/\borders\b/,name:'orders table'},
      {t:'major',re:/\bcustomers\b/,name:'customers table'},
      {t:'minor',re:/\bamount\b/,name:'amount column'},
      {t:'minor',re:/\bcust_id\b/,name:'cust_id key'},
    ]},
  { level:'MEDIUM', mult:1.5, time:90,
    prompt:'Return the <code>name</code> of every customer who has placed <b>at least one order</b>. Use a subquery against the <code>orders</code> table.',
    answer:'SELECT name FROM customers\nWHERE cust_id IN (SELECT cust_id FROM orders);',
    components:[
      {t:'major',re:/\bselect\b/,name:'SELECT'},
      {t:'major',re:/\bfrom\s+customers\b/,name:'FROM customers'},
      {t:'major',re:/\bwhere\b/,name:'WHERE'},
      {t:'major',re:/\bin\b/,name:'IN'},
      {t:'major',re:/select[\s\S]*from\s+orders/,name:'subquery on orders'},
      {t:'minor',re:/\bname\b/,name:'name column'},
      {t:'minor',re:/\bcust_id\b/,name:'cust_id key'},
    ]},
];

/* ============================== VALIDATION ============================== */
/* Keywords expected UPPERCASE; identifiers expected exact (lowercase) case;
   trailing semicolon required. Any of these = a half-heart syntax flag. */
const KW = ['SELECT','FROM','WHERE','GROUP BY','ORDER BY','HAVING','JOIN','ON','IN','AND','OR','DESC','ASC','COUNT','AVG','SUM','MIN','MAX','DISTINCT','LIKE','LIMIT'];
const IDENTS = ['employees','departments','customers','orders','emp_id','name','department','salary','hire_date','dept_name','location','budget','cust_id','city','signup_date','order_id','amount','order_date'];
function escRe(s){ return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

function validate(input, q){
  const raw = input.replace(/\s+$/,'');           // keep case + inner spacing, trim trailing ws
  const body = raw.replace(/;+\s*$/,'');           // without trailing semicolons
  const n = body.toLowerCase().replace(/\s+/g,' ').trim(); // case-insensitive structural view
  if(!n) return {result:'major', missing:q.components.filter(function(c){return c.t==='major';}).map(function(c){return c.name;})};

  // 1) structural detection (case-insensitive)
  const missMajor=[], missMinor=[];
  for(const c of q.components){
    if(!c.re.test(n)){ (c.t==='major'?missMajor:missMinor).push(c.name); }
  }
  if(missMajor.length) return {result:'major', missing:missMajor};

  // 2) syntax / style checks -> half-heart flags (only once structure is right)
  const syntax=[];
  if(!/;\s*$/.test(input.replace(/\s+$/,''))) syntax.push('missing semicolon ;');
  for(const kw of KW){
    const pat = kw.replace(/ /g,'\\s+');
    const anyCase = new RegExp('\\b'+pat+'\\b','i');
    const upper   = new RegExp('\\b'+pat+'\\b');     // case-sensitive, KW is uppercase
    if(anyCase.test(raw) && !upper.test(raw)) syntax.push('UPPERCASE '+kw);
  }
  for(const id of IDENTS){
    const anyCase = new RegExp('\\b'+escRe(id)+'\\b','i');
    const exact   = new RegExp('\\b'+escRe(id)+'\\b'); // case-sensitive, id is lowercase
    if(anyCase.test(raw) && !exact.test(raw)) syntax.push('lowercase '+id);
  }

  const allMinor = missMinor.concat(syntax);
  if(allMinor.length) return {result:'minor', missing:allMinor};
  return {result:'correct'};
}

/* ============================== GAME STATE ============================== */
let S = null;
function freshRun(){
  return { code:'SQLQ-'+Math.random().toString(36).slice(2,6).toUpperCase(),
    idx:0, score:0, hearts:3, streak:0, timeLeft:0, timer:null, locked:false };
}

/* ============================== HOME ============================== */
function renderHome(){
  stopTimer();
  document.getElementById('app').innerHTML =
   '<div class="panel home">'+
    '<div class="wordmark">SQL <span class="q">QUEST</span></div>'+
    '<div class="tag">Phosphor Console &middot; Alpha</div>'+
    '<p class="blurb">A timed, free-form SQL drill built from your Advanced Database coursework. '+
      'Type real queries against a live schema. Keep your <b>3 hearts</b>, clear both tiers, '+
      'and lock in a high score before the clock runs out.</p>'+
    '<div class="stats">'+
      '<div class="stat"><div class="v">'+STATS.highScore+'</div><div class="l">High Score</div></div>'+
      '<div class="stat"><div class="v">'+STATS.bestStreak+'</div><div class="l">Best Streak</div></div>'+
      '<div class="stat"><div class="v">'+STATS.runsCleared+'</div><div class="l">Clears</div></div>'+
      '<div class="stat"><div class="v">'+STATS.runsStarted+'</div><div class="l">Runs</div></div>'+
    '</div>'+
    '<div class="rules">'+
      '<div><span class="k">&#9656; FORMAT</span> &nbsp;Free-form SQL. Easy tier &rarr; Medium tier, 8 questions, 90s each.</div>'+
      '<div><span class="k">&#9656; TIMER</span> &nbsp;Run out of time and you lose a full heart and see the answer &mdash; then hit Continue.</div>'+
      '<div><span class="pink">&#9656; HEARTS</span> &nbsp;Detail / syntax slip (typo, wrong CASE, missing <b>;</b>) = <b>&frac12; heart</b>. Missing a whole clause = <b>1 heart</b>. 0 hearts resets you to Level 1.</div>'+
      '<div><span class="k">&#9656; SCORE</span> &nbsp;Base points &times; tier multiplier + time bonus. Misses cost points and break your streak.</div>'+
    '</div>'+
    '<button class="btn primary" id="start">&#9654; Start Run</button>'+
    '<div class="foot">Keywords are expected <b>UPPERCASE</b>, table &amp; column names <b>lowercase</b>, queries end with <b>;</b></div>'+
   '</div>';
  document.getElementById('start').onclick = startRun;
}

/* ============================== HEARTS ============================== */
function heartSVG(state){
  const path = 'M12 21 L4 13 C0 9 2 3 7 3 C9.5 3 11 5 12 6.2 C13 5 14.5 3 17 3 C22 3 24 9 20 13 Z';
  if(state==='full'){
    return '<svg viewBox="0 0 24 24"><defs><linearGradient id="hf" x1="0" x2="1"><stop offset="0%" stop-color="#ff5d8f"/><stop offset="100%" stop-color="#ff8e3c"/></linearGradient></defs><path d="'+path+'" fill="url(#hf)"/></svg>';
  }
  if(state==='empty'){
    return '<svg viewBox="0 0 24 24"><path d="'+path+'" fill="none" stroke="#3a4258" stroke-width="1.5"/></svg>';
  }
  const id='h'+Math.random().toString(36).slice(2,7);
  return '<svg viewBox="0 0 24 24"><defs><linearGradient id="'+id+'g" x1="0" x2="1"><stop offset="0%" stop-color="#ff5d8f"/><stop offset="100%" stop-color="#ff8e3c"/></linearGradient><clipPath id="'+id+'"><rect x="0" y="0" width="12" height="24"/></clipPath></defs>'+
    '<path d="'+path+'" fill="none" stroke="#3a4258" stroke-width="1.5"/>'+
    '<path d="'+path+'" fill="url(#'+id+'g)" clip-path="url(#'+id+')"/></svg>';
}
function heartsMarkup(h){
  let out='';
  for(let i=0;i<3;i++){
    const v=Math.max(0,Math.min(1,h-i));
    out += heartSVG(v>=1?'full':(v>=0.5?'half':'empty'));
  }
  return out;
}

/* ============================== QUESTION ============================== */
function renderQuestion(){
  stopTimer();
  const q=QUESTIONS[S.idx];
  S.timeLeft=q.time; S.locked=false;
  const levelClass=q.level.toLowerCase();
  document.getElementById('app').innerHTML =
   '<div class="panel hud">'+
     '<div class="left">'+
       '<div class="hearts" id="hearts">'+heartsMarkup(S.hearts)+'</div>'+
       '<div class="score-wrap"><span class="l">Score</span><span class="v" id="score">'+S.score+'</span></div>'+
     '</div>'+
     '<div style="text-align:right">'+
       '<div class="level-pill '+levelClass+'">'+q.level+'</div>'+
       '<div class="code" style="margin-top:8px">RUN <b>'+S.code+'</b></div>'+
     '</div>'+
   '</div>'+
   '<div class="timer" id="timerbar"><div class="fill" id="timerfill"></div></div>'+
   '<div class="panel q-panel">'+
     '<div class="q-top">'+
       '<div class="q-num">Question '+(S.idx+1)+' / '+QUESTIONS.length+'</div>'+
       '<div class="q-timeleft" id="timeleft">'+q.time+'s</div>'+
     '</div>'+
     '<p class="q-prompt">'+q.prompt+'</p>'+
     '<button class="schema-toggle" id="schematoggle">&#9656; show schema</button>'+
     '<div class="schema" id="schema">'+schemaMarkup()+'</div>'+
     '<div class="console-label">Your query</div>'+
     '<div class="editor"><textarea id="editor" spellcheck="false" autocapitalize="off" autocomplete="off" placeholder="type your SQL here..."></textarea></div>'+
     '<div class="row">'+
       '<button class="btn primary" id="run">&#9654; Run query</button>'+
       '<button class="btn ghost" id="skip">Skip (&minus;1 &hearts;)</button>'+
       '<span class="hintkey"><kbd>Ctrl</kbd>+<kbd>Enter</kbd> to run</span>'+
     '</div>'+
     '<div class="feedback" id="feedback"></div>'+
     '<div id="continuebar"></div>'+
   '</div>';

  const ta=document.getElementById('editor');
  ta.focus();
  document.getElementById('run').onclick=function(){ submit(); };
  document.getElementById('skip').onclick=function(){ timeoutOrSkip(true); };
  ta.addEventListener('keydown',function(e){
    if((e.ctrlKey||e.metaKey)&&e.key==='Enter'){ e.preventDefault(); submit(); }
  });
  const sch=document.getElementById('schema'), tog=document.getElementById('schematoggle');
  tog.onclick=function(){ sch.classList.toggle('open');
    tog.innerHTML=(sch.classList.contains('open')?'&#9662; hide schema':'&#9656; show schema'); };

  startTimer();
}

function startTimer(){
  const fill=document.getElementById('timerfill');
  const bar=document.getElementById('timerbar');
  const label=document.getElementById('timeleft');
  const total=QUESTIONS[S.idx].time;
  S.timer=setInterval(function(){
    S.timeLeft-=0.1;
    if(S.timeLeft<=0){ S.timeLeft=0; stopTimer(); timeoutOrSkip(false); return; }
    const pct=(S.timeLeft/total)*100;
    if(fill) fill.style.width=pct+'%';
    if(label) label.textContent=Math.ceil(S.timeLeft)+'s';
    if(pct<30){ if(bar) bar.classList.add('warn'); if(label) label.classList.add('warn'); }
  },100);
}
function stopTimer(){ if(S&&S.timer){ clearInterval(S.timer); S.timer=null; } }

function refreshHUD(){
  const h=document.getElementById('hearts'); if(h) h.innerHTML=heartsMarkup(S.hearts);
  const sc=document.getElementById('score'); if(sc) sc.textContent=S.score;
}
function lockControls(){
  S.locked=true;
  ['run','skip'].forEach(function(id){ const el=document.getElementById(id); if(el) el.disabled=true; });
  const ta=document.getElementById('editor'); if(ta) ta.disabled=true;
}
function showFeedback(kind, headHTML, bodyHTML, reveal){
  const f=document.getElementById('feedback'); if(!f) return;
  f.className='feedback show '+kind;
  let html='<span class="head">'+headHTML+'</span>'+(bodyHTML||'');
  if(reveal){ html+='<div class="reveal"><span class="lbl">Correct answer</span>'+reveal+'</div>'; }
  f.innerHTML=html;
}
function showContinue(label, fn){
  const bar=document.getElementById('continuebar'); if(!bar) return;
  bar.innerHTML='<button class="btn primary" id="continue">'+label+'</button>';
  const c=document.getElementById('continue');
  c.onclick=fn; c.focus();
}
function fmtIssues(list){
  if(list.length<=3) return list.join(', ');
  return list.slice(0,3).join(', ')+' (+'+(list.length-3)+' more)';
}
function goNext(){
  S.idx+=1;
  if(S.idx>=QUESTIONS.length) return runCleared();
  renderQuestion();
}

/* ============================== SUBMIT ============================== */
function submit(){
  if(S.locked) return;
  const q=QUESTIONS[S.idx];
  const v=validate(document.getElementById('editor').value, q);

  if(v.result==='correct'){
    stopTimer(); lockControls();
    const remaining=Math.ceil(S.timeLeft);
    const base=100*q.mult;
    const bonus=Math.round(remaining*(q.level==='MEDIUM'?3:2));
    const gained=Math.round(base+bonus);
    S.score+=gained; S.streak+=1;
    if(S.streak>STATS.bestStreak) STATS.bestStreak=S.streak;
    refreshHUD();
    showFeedback('correct','&#10003; CORRECT',
      '+'+Math.round(base)+' base &nbsp;&middot;&nbsp; +'+bonus+' time bonus &nbsp;&middot;&nbsp; <b>+'+gained+' pts</b> &nbsp;|&nbsp; streak '+S.streak);
    showContinue('Continue &#9654;', goNext);
    return;
  }

  // a miss: deduct hearts + points, break streak, let them retry (unless 0 hearts)
  S.streak=0;
  S.score=Math.max(0,S.score-25);
  if(v.result==='minor'){
    S.hearts=Math.max(0,S.hearts-0.5);
    refreshHUD();
    if(S.hearts<=0) return gameOver(q);
    showFeedback('minor','&#9680; &frac12; HEART LOST &mdash; detail / syntax',
      'Close &mdash; the structure is right, but: <b>'+fmtIssues(v.missing)+'</b>. &nbsp;&minus;25 pts. Fix it and run again.');
  }else{
    S.hearts=Math.max(0,S.hearts-1);
    refreshHUD();
    if(S.hearts<=0) return gameOver(q);
    showFeedback('major','&hearts; HEART LOST &mdash; missing clause',
      'Your query is missing: <b>'+fmtIssues(v.missing)+'</b>. &nbsp;&minus;25 pts. Rebuild it and run again.');
  }
}

/* timeout (auto) or manual skip: full heart, reveal answer, wait for Continue */
function timeoutOrSkip(isSkip){
  if(S.locked) return;
  stopTimer(); lockControls();
  const q=QUESTIONS[S.idx];
  S.streak=0;
  S.hearts=Math.max(0,S.hearts-1);
  refreshHUD();
  if(S.hearts<=0) return gameOver(q);
  showFeedback('major', isSkip?'&#9197; SKIPPED &mdash; &minus;1 &hearts;':'&#9201; TIME UP &mdash; &minus;1 &hearts;',
    "Here's the query you were after &mdash; study it, then continue.", escapeHTML(q.answer));
  showContinue('Continue &#9654;', goNext);
}

/* ============================== END STATES ============================== */
async function gameOver(q){
  stopTimer(); lockControls();
  showFeedback('major','&#10007; RUN OVER &mdash; 0 hearts',
    "That's all three hearts. The run ends here &mdash; back to Level 1.", escapeHTML(q.answer));
  await finalizeStats(false);
  showContinue('See results &#9654;', function(){ renderResult(false); });
}
async function runCleared(){
  stopTimer();
  STATS.runsCleared+=1;
  await finalizeStats(true);
  renderResult(true);
}
async function finalizeStats(cleared){
  S._newHigh = (S.score>STATS.highScore);
  if(S._newHigh) STATS.highScore=S.score;
  await saveStats();
}

function renderResult(cleared){
  stopTimer();
  const newHigh=S._newHigh;
  document.getElementById('app').innerHTML =
   '<div class="panel result">'+
     '<div class="big '+(cleared?'win':'lose')+'">'+(cleared?'&#9733; RUN CLEARED &#9733;':'GAME OVER')+'</div>'+
     '<p class="sub">'+(cleared
        ? 'You cleared both tiers &mdash; every clause held. That is the retention rep that sticks.'
        : 'Hearts depleted. The answers you saw are the ones to drill before your next run.')+'</p>'+
     '<div class="finalscore">'+S.score+'<span style="font-size:11px;color:var(--muted);display:block;letter-spacing:2px;margin-top:8px">FINAL SCORE</span>'+
        (newHigh?'<span class="new">&#9670; NEW HIGH SCORE &#9670;</span>':'')+'</div>'+
     '<div class="runcode-box"><span class="l">Run code</span><span class="v">'+S.code+'</span></div>'+
     '<div class="stats" style="margin-top:26px">'+
       '<div class="stat"><div class="v">'+STATS.highScore+'</div><div class="l">High Score</div></div>'+
       '<div class="stat"><div class="v">'+STATS.bestStreak+'</div><div class="l">Best Streak</div></div>'+
       '<div class="stat"><div class="v">'+STATS.runsCleared+'</div><div class="l">Clears</div></div>'+
       '<div class="stat"><div class="v">'+STATS.runsStarted+'</div><div class="l">Runs</div></div>'+
     '</div>'+
     '<div class="row">'+
       '<button class="btn primary" id="again">&#9654; New Run</button>'+
       '<button class="btn ghost" id="home">Home</button>'+
     '</div>'+
   '</div>';
  document.getElementById('again').onclick=startRun;
  document.getElementById('home').onclick=renderHome;
}

/* ============================== HELPERS / BOOT ============================== */
function escapeHTML(s){ return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
async function startRun(){
  S=freshRun();
  STATS.runsStarted+=1;
  await saveStats();
  renderQuestion();
}
(async function(){ await loadStats(); renderHome(); })();
</script>
